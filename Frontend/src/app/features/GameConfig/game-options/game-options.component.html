<div class="game-config-container">
  <form #configForm="ngForm" class="form-content">

    <div class="title-config">
      <h1 class="title">Configuración de Juego</h1>
      <div class="lane"></div>
    </div>

    <!-- Sección de Cantidad de Jugadores y Color -->
    <div class="options-grid">
      <div class="option-item">
        <label class="option-label">Cantidad de jugadores</label>
        <p class="option-hint">Mínimo 3, máximo 6</p>
        <div class="players-size">
          <button class="btn-plyr-size" type="button" (click)="removePlayers()" [disabled]="options.players == 3">−</button>
          <p class="players-count">{{options.players}}</p>
          <button class="btn-plyr-size" type="button" (click)="addPlayers()" [disabled]="options.players == 6">+</button>
        </div>
      </div>

      <div class="option-item">
        <label class="option-label" for="color">Seleccione su color</label>
        <select class="color-selection" name="color" [(ngModel)]="options.host.color.id">
          <option value="1">Rojo</option>
          <option value="2">Azul</option>
          <option value="3">Verde</option>
          <option value="4">Amarillo</option>
          <option value="5">Negro</option>
          <option value="6">Magenta</option>
        </select>
      </div>
    </div>

    <!-- Sección de Bots -->
    <div class="bots-section">
      <label class="section-label">Elegir Bots</label>
      <div class="bot-players">
        @for (item of Array(options.players - 1); track $index) {
          <div class="bot-player">
            <input type="checkbox" #checkbox (click)="checkBot($index)" />
            <p>Bot {{$index + 1}}</p>
            <select #select class="bot-difficulty" name="level" [disabled]="checkbox.checked">
              <option value="Novice">Novato</option>
              <option value="Balanced">Balanceado</option>
              <option value="Expert">Experto</option>
            </select>
          </div>
        }
      </div>
    </div>

    <!-- Botones de Acción -->
    <div class="actions-butons">
      <button class="action-btn" type="button" (click)="goLobby()">Volver</button>
      <button class="action-btn" type="button" (click)="emitSubmit();changePageToPlayers.emit('game-players')">Buscar Jugadores</button>
    </div>
  </form>
</div>
