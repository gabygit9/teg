<div class="inicio-container">
  <section class="hero-section">
    <div class="hero-content">

      <div class="logo-section">
        <img src="/assets/pagesImages/logo-teg.png" alt="TEG Logo" class="main-logo" />
      </div>

      <h1 class="main-title">TÁCTICA Y ESTRATEGIA DE LA GUERRA</h1>

      <div class="actions-wrapper">
        @if (isLogged) {
          <div class="user-welcome">
            <h2>¡Bienvenido de nuevo, <span class="user-name">{{ userName }}</span>!</h2>

            <div class="hero-buttons">
              <button class="btn-teg btn-continuar" (click)="goLobby()">
                <i class="fa-solid fa-play btn-icon"></i>
                <span class="btn-text">Continuar Jugando</span>
              </button>

              <button class="btn-teg btn-cerrar-sesion" (click)="logOut()">
                <i class="fa-solid fa-right-from-bracket btn-icon"></i>
                <span class="btn-text">Cerrar Sesión</span>
              </button>
            </div>
          </div>
        } @else {
          <div class="guest-actions">
            <div class="hero-buttons">
              <button class="btn-teg btn-continuar" (click)="goLogin()">
                <i class="fa-solid fa-right-to-bracket btn-icon"></i>
                <span class="btn-text">Iniciar Sesión</span>
              </button>

              <button class="btn-teg btn-cerrar-sesion" (click)="goRegistry()">
                <i class="fa-solid fa-user-plus btn-icon"></i>
                <span class="btn-text">Crear Cuenta</span>
              </button>
            </div>
          </div>
        }
      </div>

    </div>
  </section>
</div>
