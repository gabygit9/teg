<div class="login-container">
  <img class="logo"
       ngSrc="/assets/pagesImages/logo-teg.png"
       alt="logo-teg"
       height="250"
       width="250"
       priority
  >

  <form #login="ngForm" (ngSubmit)="onSubmit(login)">
    <div *ngIf="isLoggedIn">
      <h2 class="texto-blanco-grande">Sesión iniciada por: <strong>{{ userName }}</strong></h2>
      <div class="form-button-container">
        <button class="btn" type="button" (click)="irAlLobby()">Volver al Lobby</button>
        <button class="btn btn-cerrar-sesion" type="button" (click)="logOut()">Cerrar sesión</button>
      </div>
    </div>

    <ng-container *ngIf="!isLoggedIn">
      <div class="form-component">
        <label for="email">Correo Electrónico</label>
        <input class="form-input"
               id="email"
               name="email"
               type="email"
               placeholder="ej: usuario@example.com"
               #loginEmail="ngModel"
               required email minlength="10" maxlength="30"
               [(ngModel)]="userModel.email"
        >
      </div>

      <div class="form-component">
        <label for="password">Contraseña</label>
        <input class="form-input"
               id="password"
               name="password"
               type="password"
               placeholder="Mínimo 6 caracteres"
               #loginPassword="ngModel"
               required minlength="6" maxlength="20"
               [(ngModel)]="userModel.password"
        >
      </div>
      <div class="form-button-container">
        <button class="btn" type="submit">Iniciar Sesión</button>
        <button class="btn" type="button" routerLink="/register">Registrarse</button>
      </div>
    </ng-container>

    <div class="form-button-container">
      <button class="btn" type="button" routerLink="/update" [disabled]="!isLoggedIn" [class.btn-disabled]="!isLoggedIn">Actualizar registro</button>
    </div>

    <div class="form-button-container">
      <button class="btn btn-outline" type="button" routerLink="/">Volver al Inicio</button>
    </div>


  </form>
</div>
