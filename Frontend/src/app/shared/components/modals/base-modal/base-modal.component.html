<div *ngIf="isOpen"
     [class]="backdropClasses"
     (click)="onBackdropClickHandler($event)"
     [@modalAnimation]>

  <div [class]="modalClasses"
       (click)="onModalContentClick($event)"
       [@slideAnimation]>

    <!-- Header del Modal -->
    <div *ngIf="showHeader" class="modal-header">

      <!-- Título -->
      <div class="modal-title-section">
        <ng-content select="[slot=icon]"></ng-content>
        <h2 *ngIf="title" class="modal-title">{{ title }}</h2>
        <ng-content select="[slot=title]"></ng-content>
      </div>

      <!-- Botón de cerrar -->
      <button *ngIf="showCloseButton"
              class="modal-close-button"
              (click)="closeModal()"
              aria-label="Cerrar modal">
        <span class="close-icon">✕</span>
      </button>

    </div>

    <!-- Contenido del Modal -->
    <div class="modal-body">
      <ng-content></ng-content>
    </div>

    <!-- Footer del Modal -->
    <div *ngIf="showFooter" class="modal-footer">
      <ng-content select="[slot=footer]"></ng-content>
    </div>

  </div>

</div>
