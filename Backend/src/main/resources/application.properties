##### Application properties #####
app.name='@project.name@'
app.desc='@project.description@'
app.version='@project.version@'
app.url=http://localhost:8080
app.dev-name=John Doe
app.dev-email=dumy@dumy

#####  SPRING DOC PROPERTIES #####
springdoc.packages-to-scan=ar.edu.utn.frc.tup.piii.controllers
springdoc.show-actuator=true
#springdoc.swagger-ui.disable-swagger-default-url=true
# swagger-ui custom path
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

spring.mvc.view.prefix=none
spring.mvc.view.suffix=none

##Spring Data Source##
spring.sql.init.mode=always

spring.jpa.hibernate.ddl-auto=update
## Spring JPA ##

##### JWT CONFIG #####
jwt.secret=${JWT_SECRET}
jwt.expiracion=${JWT_EXPIRATION}

logging.level.root=WARN

# ---------- DATASOURCE ----------
spring.datasource.url=${BD_URL}
spring.datasource.driver-class-name=${BD_DRIVER}
spring.datasource.username=${BD_USER}
spring.datasource.password=${BD_PASSWORD:}
# Forzar dialecto por defecto si no se proporciona
spring.jpa.database-platform=${BD_DIALECT}
# Evita problemas de inicializaciˇn cuando hay inicializadores SQL
spring.jpa.defer-datasource-initialization=true
