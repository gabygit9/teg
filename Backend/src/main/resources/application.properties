##### Application properties #####
app.name='@project.name@'
app.desc='@project.description@'
app.version='@project.version@'
app.url=http://localhost:8080
app.dev-name=John Doe
app.dev-email=dumy@dumy

#####  SPRING DOC PROPERTIES #####
springdoc.packages-to-scan=ar.edu.utn.frc.tup.piii.controllers
springdoc.show-actuator=true
#springdoc.swagger-ui.disable-swagger-default-url=true
# swagger-ui custom path
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

spring.mvc.view.prefix=none
spring.mvc.view.suffix=none

##Spring Data Source##
spring.sql.init.mode=never

spring.jpa.hibernate.ddl-auto=update
## Spring JPA ##

##### JWT CONFIG #####
jwt.secret=${JWT_SECRET}
jwt.expiracion=${JWT_EXPIRATION}

logging.level.root=WARN

# ---------- DATASOURCE (usar variables de entorno si existen, si no caer a H2 local embebida) ----------
# Si BD_URL está definida en el entorno debe empezar con 'jdbc:'. Si no, se usará H2 en memoria por defecto.
spring.datasource.url=${BD_URL:jdbc:h2:mem:defaultdb;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driver-class-name=${BD_DRIVER:org.h2.Driver}
spring.datasource.username=${BD_USER:sa}
spring.datasource.password=${BD_PASSWORD:}
# Forzar dialecto por defecto si no se proporciona
spring.jpa.database-platform=${BD_DIALECT:org.hibernate.dialect.H2Dialect}
# Evita problemas de inicialización cuando hay inicializadores SQL
spring.jpa.defer-datasource-initialization=true
