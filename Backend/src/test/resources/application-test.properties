# Permitir redefinición de beans si fuera necesario
spring.main.allow-bean-definition-overriding=true

# Desactivar la seguridad (si tu SecurityConfig está con @Profile("!test"))
spring.security.enabled=false

# Configuración de base de datos H2 en memoria para tests
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Para que Spring Boot cree las tablas según tus entidades
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Logging más limpio en tests
logging.level.root=ERROR

# Para evitar el PlaceholderResolutionException
jwt.secreto=claveTest123
jwt.expiracion=86400000
